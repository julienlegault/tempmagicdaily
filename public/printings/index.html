<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Daily Printings</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <h1>MTG Printings</h1>
    <section id="modeLanding" class="mode-landing">
      <p class="subtitle">Choose a mode to start.</p>
      <div class="mode-actions">
        <button id="startDailyMode">Daily</button>
        <button id="startPracticeMode">Practice</button>
      </div>
    </section>

    <div id="gameArea" class="hidden">
      <p class="subtitle">Guess the set with the most expensive printing of the selected card.</p>

      <section id="cardFrame" class="card-frame" aria-live="polite">
        <p class="loading">Loading card…</p>
      </section>

      <div id="setTimeline" class="set-timeline hidden" aria-label="Set symbols in order of release"></div>

      <section class="guess-panel">
        <div class="guess-row">
          <input id="setGuessInput" type="text" placeholder="Guess by set name or set code…" autocomplete="off" />
          <select id="finishGuessInput" aria-label="Select foil or non-foil">
            <option value="nonfoil">Non-foil</option>
            <option value="foil">Foil</option>
          </select>
          <button id="setGuessButton">Guess</button>
        </div>
        <ul id="setAutocomplete" class="autocomplete"></ul>
        <p id="guessStatus" class="status" aria-live="polite"></p>
      </section>

      <section class="results">
        <div class="results-header results-row">
          <span>Set</span>
          <span># / Variant</span>
          <span>Price</span>
          <span>Year</span>
        </div>
        <div id="resultsGrid"></div>
      </section>
    </div>
  </main>

  <div id="winModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="modal-content">
      <h2 id="winTitle">You got it!</h2>
      <p id="winMessage"></p>
      <img id="winCardImage" alt="Winning card printing" />
      <button id="closeWinModal">Close</button>
    </div>
  </div>

  <div id="versionPickerModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="versionPickerTitle">
    <div class="modal-content version-modal-content">
      <h2 id="versionPickerTitle">Choose a version</h2>
      <div id="versionPickerGrid" class="version-grid"></div>
      <button id="closeVersionPickerModal">Cancel</button>
    </div>
  </div>

  <script type="module" src="../printings.js"></script>
</body>
</html>
